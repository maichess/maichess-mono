opencollection: 1.0.0

info:
  name: main
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: API_URL
      value: http://localhost:5005/api/v1
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
